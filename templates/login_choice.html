<!DOCTYPE html>
<html>
<head>
    <title>Login Choice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .choice-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 40px;
            font-size: 28px;
        }
        .btn {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 15px auto;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-driver {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-admin {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-back {
            background: #999;
            font-size: 14px;
            width: 150px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="choice-container">
        <h2>Select Login Type</h2>
        <a href="/login/driver" class="btn btn-driver">Driver Login</a>
        <a href="/login/admin" class="btn btn-admin">Admin Login</a>
        <a href="/" class="btn btn-back">Back to Home</a>
    </div>
</body>
</html>
