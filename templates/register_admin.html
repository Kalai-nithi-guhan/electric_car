<!DOCTYPE html>
<html>
<head>
    <title>Admin Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #11998e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0d7a70;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
        .info {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #11998e;
            text-decoration: none;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>🔐 Admin Registration</h2>
        
        <div class="info">
            ⚠️ You need an existing admin's password to register a new admin account.
        </div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <label>Username:</label>
            <input type="text" name="username" placeholder="Enter admin username" required>

            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter email" required>

            <label>Phone:</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>

            <label>Password (for new admin):</label>
            <input type="password" name="password" placeholder="Enter new password" required>

            <label>Existing Admin Password:</label>
            <input type="password" name="existing_admin_password" placeholder="Enter any existing admin's password" required>

            <button type="submit">Register as Admin</button>
        </form>

        <div class="links">
            <p>Already have an admin account? <a href="/login/admin">Login here</a></p>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
