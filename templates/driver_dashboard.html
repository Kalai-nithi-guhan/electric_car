<!DOCTYPE html>
<html>
<head>
    <title>Driver Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .success-icon {
            font-size: 72px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }
        .username {
            color: #667eea;
            font-weight: bold;
            font-size: 24px;
        }
        .btn {
            background-color: #f44336;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin-top: 20px;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">✓</div>
    <h1>Driver Logged In Successfully!</h1>
    <p>Welcome, <span class="username">{{ username }}</span></p>
    <p>You have successfully logged into your driver account.</p>
    <a href="/logout" class="btn">Logout</a>
</div>

</body>
</html>
