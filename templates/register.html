<!DOCTYPE html>
<html>
<head>
    <title>Register - Driver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #5568d3;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Register as Driver</h2>
        <p style="text-align:center;color:#666;font-size:13px;">Car ID is auto-assigned. If a car is available, it will be reused.</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <label>Username:</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Driver Name:</label>
            <input type="text" name="driver_name" placeholder="Full name (optional)">

            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter email" required>

            <label>Phone:</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>

            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <label>City:</label>
            <input type="text" name="city" placeholder="Enter city" required>

            <label>Vehicle Type:</label>
            <input type="text" name="vehicle_type" placeholder="Optional (used only if no car is available)">

            <button type="submit">Register</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/login/driver">Login here</a></p>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
